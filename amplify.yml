version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - if [ "$AWS_BRANCH" = "main" ]; then export VITE_API_URL=https://lloyd.111hardware.com/api; fi
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*